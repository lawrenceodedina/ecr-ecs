name: ecr ecs deploy
on:
  push:
    branches: [main]    
permissions:
    contents: read
    id-token: write
env:
  REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO: ${{ secrets.AWS_ECR_REPO }}
  ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  ECS_CLUSTER: ${{ secrets.CLUSTER_NAME }}
  ECS_CONTAINER_NAME: ${{ secrets.CONTAINER_NAME}}
  ECS_SERVICE: ${{ secrets.SERVICE_NAME }}

  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - name: Check out code
          uses: actions/checkout@v4
        
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4
        
        - name: Build docker image
          uses: docker/build-push-action@v7
          with:
           context: .
           push: false
           tags: |
             ${{ env.ECR_REPO }}:latest
             ${{ env.ECR_REPO }}:${{ github.run_number }}
           outputs: type=docker,dest=${{ runner.temp }}/images.tar
        
        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: images
            path: ${{ runner.temp }}/images.tar

  scan-and-deploy-to-ecr:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: images
          path: ${{ runner.temp }}

      - name: Load image
        run: |
          docker load --input ${{ runner.temp }}/images.tar
          docker images

      - name: scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.ECR_REPO }}:${{ github.run_number }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
      
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.REGION }}
          role-to-assume: ${{ env.ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Build docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
             ${{ env.ECR_REPO }}:latest
             ${{ env.ECR_REPO }}:${{ github.run_number }}

  deploy_to_ecs:
    needs: scan-and-deploy-to-ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.REGION }}
          role-to-assume: ${{ env.ROLE_ARN }}
      
      - name: Modify task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: femi-dragon-task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ env.ECR_REPO }}:${{ github.run_number}}
      
      - name: Deploy to Amazon ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          
        

      
      