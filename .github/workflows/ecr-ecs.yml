name: ecr ecs deploy
on:
    push:
      branches: [main]
permissions:
    contents: read
    id-token: write

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_NUMBER: '396608766727'
  ECR_REPO: 396608766727.dkr.ecr.us-east-1.amazonaws.com/testecr
  IMAGE_NAME: femitest
jobs:
  ecr-build-and-deploy:
    runs-on: ubuntu-latest
    steps:
        - name: Check out code
          uses: actions/checkout@v4
        
        - name: configure aws credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws_region: $AWS_REGION
            role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        
        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2
        
        - name: Build and push
          uses: docker/build-push-action@v7
          with:
           context: .
           push: true
           tags: |
             $ECR_REPO/IMAGE_NAME:latest
             $ECR_REPO/IMAGE_NAME:${{ github.run_number }}
